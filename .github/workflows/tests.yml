name: Unity Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # Allows manual triggering

jobs:
  test:
    name: Test Unity ${{ matrix.unityVersion }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        unityVersion: [6000.0.23f1]   # Use your project's Unity version

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library folder
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ matrix.unityVersion }}-${{ hashFiles('Packages/manifest.json') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ matrix.unityVersion }}-

      # 🔐 Activate Unity using Personal account credentials
      - name: Unity - Activate
          # You may pin to the exact commit or the version.
          # uses: game-ci/unity-activate@33cd3ea96f11f3a1ddcf8fa9d8d265d5ea81e240
        uses: game-ci/unity-activate@v2.0.0
        with:
          # Version of unity to use for building the project.
          unityVersion: # optional, default is 2019.2.11f1

      # 🧪 Run Edit Mode tests
      - name: Run Edit Mode tests
        uses: game-ci/unity-test-runner@v4
        with:
          unityVersion: ${{ matrix.unityVersion }}
          projectPath: .
          testMode: editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          customParameters: -nographics -batchmode

      # 🎮 Run Play Mode tests
      - name: Run Play Mode tests
        uses: game-ci/unity-test-runner@v4
        with:
          unityVersion: ${{ matrix.unityVersion }}
          projectPath: .
          testMode: playmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          customParameters: -nographics -batchmode

      # 📦 Upload test results as artifacts
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test Results
          path: |
            **/test-results/*.xml
            **/TestResults.xml
