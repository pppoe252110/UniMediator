name: Unity Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # Allows manual triggering

jobs:
  test:
    name: Test Unity ${{ matrix.unityVersion }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        unityVersion: [6000.3.7f1]   # Add back matrix definition

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library folder
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ matrix.unityVersion }}-${{ hashFiles('Packages/manifest.json') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ matrix.unityVersion }}-

      - name: Run Play Mode tests
        uses: game-ci/unity-test-runner@v4
        with:
          unityVersion: ${{ matrix.unityVersion }}
          projectPath: .
          testMode: playmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          customParameters: -nographics -batchmode
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test Results
          path: |
            **/test-results/*.xml
            **/TestResults.xml
