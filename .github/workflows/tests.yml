name: Unity Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Unity Project
    runs-on: ubuntu-latest
    strategy:
      matrix:
        unityVersion: [6000.0.23f1]  # Use a stable version, not beta

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Library folder
        uses: actions/cache@v3
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ matrix.unityVersion }}-${{ hashFiles('Packages/manifest.json') }}
          restore-keys: |
            Library-${{ runner.os }}-${{ matrix.unityVersion }}-

      - name: Activate Unity
        uses: game-ci/unity-actions/activate@v2
        with:
          unityVersion: ${{ matrix.unityVersion }}
          unityEmail: ${{ secrets.UNITY_EMAIL }}
          unityPassword: ${{ secrets.UNITY_PASSWORD }}

      - name: Run Edit Mode tests
        uses: game-ci/unity-actions/test-runner@v2
        with:
          unityVersion: ${{ matrix.unityVersion }}
          projectPath: .
          testMode: editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          customParameters: -nographics -batchmode

      - name: Run Play Mode tests
        uses: game-ci/unity-actions/test-runner@v2
        with:
          unityVersion: ${{ matrix.unityVersion }}
          projectPath: .
          testMode: playmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          customParameters: -nographics -batchmode

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Test Results
          path: |
            **/test-results/*.xml
            **/TestResults.xml
